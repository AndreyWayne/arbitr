<div class="constructor__item constructor__item--border-top" data-row>
    <div class="constructor__item" data-form-checkbox-group-value="legal">
        <div class="constructor__row">
            <div class="constructor__col constructor__col--full">
                <div class="constructor__label-row constructor__label-cite">
                  <div class="constructor__label-text">
                    Укажите его роль для Вас -
                  </div>
                  <div class="w-full">
                    <input
                      data-input-required
                      name="data-debtor-role[]"
                      class="form-input w-340px"
                    />
                    <cite class="note">например, если Вы являетесь грузоотправителем, а первый должник - экспедитором, то последующие должники будут фактическими перевозчиками</cite>
                  </div>
                </div>
            </div>
        </div>
        <b class="constructor__bold-label">
            Должник является:
        </b>
        <div class="constructor__row checkbox-group" data-form-checkbox-group>
            <div class="constructor__col">
                <label class="radio">
                    <input class="radio__input" 
                        type="checkbox"
                        name="data-debtor-type[]"
                        value="legal"
                        checked
                    >
                    <span class="radio__emulator">
                        <svg class="radio__icon i-icon">
                            <use xlink:href="#icon-check"></use>
                        </svg>
                    </span>
                    <span class="radio__label">
                       Организацией
                    </span>
                </label>
            </div>
            <div class="constructor__col">
                <label class="radio">
                    <input class="radio__input" 
                           type="checkbox"
                           name="data-debtor-type[]"
                           value="ie">
                    <span class="radio__emulator">
                        <svg class="radio__icon i-icon">
                            <use xlink:href="#icon-check"></use>
                        </svg>
                    </span>
                    <span class="radio__label">
                        Индивидуальным предпринимателем
                    </span>
                </label>
            </div>
            <div class="constructor__col">
                <button class="constructor__row-delete btn-toggle btn-toggle--delete w-full m-0" data-btn-delete-row type="button">
                    <span class="btn-toggle__icon"></span>
                    <div class="btn-toggle__text">
                        Удалить должника, если он добавлен ошибочно
                    </div>
                </button>
            </div>
        </div>
    </div>
    <div class="constructor__row">
      <div class="constructor__col constructor__col--full">
          <label class="constructor__label-row">
            <span class="constructor__label-text">
                Введите его ИНН:
            </span>
            <input type="text" data-input-required class="form-input w-340px" name="data-debtor-inn[]">
          </label>
      </div>
    </div>
    <div class="constructor__item" data-form-checkbox-group-variant="ie">
      <div class="constructor__row flex-grow-2">
        <div class="constructor__col constructor__col--xxs">
          <div class="constructor__label-row">
            <span class="constructor__label-text">
              Дату рождения:
            </span>
            <input
              type="text"
              name="data-debtor-birthday[]"
              placeholder="00.00.0000"
              data-input-date="d.m.Y"
              class="form-input"
            />
          </div>
        </div>
        <div class="constructor__col constructor__col--xxs flex-grow-2">
          <div class="constructor__label-row flex-grow-2">
            <span class="constructor__label-text">Место рождения:</span>
            <input name="data-debtor-place-of-birth[]" class="form-input w-340px" />
          </div>
        </div>
      </div>
      <div class="constructor__row">
        <div class="constructor__col  constructor__col--full">
          <label class="constructor__label-row">
            <span class="constructor__label-text">
              Адрес его места жительства:
            </span>
            <input type="text" class="form-input" name="data-debtor-address[]">
          </label>
        </div>
    </div>
  </div>
</div>
