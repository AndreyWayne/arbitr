<div class="modal modal--form" id="buy-tarif-modal">
    <div class="modal__top">
        <h3 class="modal__heading h2">
            Купить тариф за столько-то рублей
        </h3>
    </div>

    <div class="modal__body">
        <form class="modal__form form" data-form data-ajax-success-form="./templates/success-modal.html" data-ajax-error-form="./templates/error-modal.html">
            <div class="form-row">
                <div class="form-col">
                    <label for="buy-tarif-tel">Контактный телефон</label>
                    <input id="buy-tarif-tel" name="buy-tarif-tel" type="text" class="form-input inputmask" data-input-required="phone">
                </div>
            </div>
            <div class="form-row">
                <div class="form-col">
                    <label for="buy-tarif-email">Электронная почта</label>
                    <input id="buy-tarif-email" name="buy-tarif-email" type="email" class="form-input" data-input-required="email">
                </div>
            </div>
            <div class="form-row form-row--agreement">
                <div class="form-col">
                    <label class="checkbox">
                        <input id="buy-tarif-agreement" name="buy-tarif-agreement" class="checkbox__input" type="checkbox" data-input-required="checkbox">
                        <span class="checkbox__emulator">
                            <svg class="checkbox__icon i-icon">
                                <use xlink:href="#icon-check"></use>
                            </svg>
                        </span>
                        <span class="checkbox__label">
                            Согласен на обработку <a class="link link--underline" href="">персональных данных</a>
                        </span>
                    </label>
                </div>
            </div>
            <div class="form-row form-row--confirm">
                <div class="form-col">
                    <button class="btn" type="submit">Купить</button>
                </div>
            </div>
        </form>
    </div>
</div>
