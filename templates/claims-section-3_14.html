<fieldset 
  data-form-field-visible='{
    "consumer-protection-claim": ["yes"],
    "statement-type": ["doc1"],
    "claim-cause": ["val2"]
  }'
  class="constructor__block"
>
  <legend class="h4 constructor__block-title">3.14. Требованиями, заявляемыми к застройщику, являются:</legend>
  <div class="constructor__item">
    <div class="constructor__row">
      <div class="constructor__col">
        <label class="radio radio--lg">
          <input
            class="radio__input"
            type="radio"
            name="requirements-developer"
            value="val1"
            checked
          />
          <span class="radio__emulator">
            <svg class="radio__icon i-icon">
              <use xlink:href="#icon-check"></use>
            </svg>
          </span>
          <span class="radio__label">
            о выплате неустойки за непередачу объекта долевого строительства в указанный в договоре срок
          </span>
        </label>
      </div>
    </div>
    <div class="constructor__row">
      <div class="constructor__col">
        <label class="radio radio--lg">
          <input
            class="radio__input"
            type="radio"
            name="requirements-developer"
            value="val2"
          />
          <span class="radio__emulator">
            <svg class="radio__icon i-icon">
              <use xlink:href="#icon-check"></use>
            </svg>
          </span>
          <span class="radio__label ">
            об уменьшении цены квартиры на сумму расходов, необходимых для приведения квартиры в состояние в
            соответствие с договором
          </span>
        </label>
      </div>
    </div>
    <div class="constructor__row">
      <div class="constructor__col constructor__col--full">
        <label class="constructor__label-row items-start">
          <span class="constructor__label-text">
            Загрузите скан договора долевого участия или иного договора с застройщиком (в формате pdf)
          </span>
          <div
            class="file-attacher"
            data-file-attacher
          >
            <input
              id="requirements-developer-file"
              type="file"
              name="requirements-developer-file"
              accept=".pdf"
              data-file-attacher-input
              data-input-required
              class="file-attacher__input"
            />
            <label
              class="file-attacher__btn-text"
              for="requirements-developer-file"
              data-file-attacher-add-btn
            >
              <svg class="i-icon">
                <use xlink:href="#icon-file"></use>
              </svg>
              <span>Прикрепить файл</span>
            </label>
            <ul
              class="file-attacher__list"
              data-file-attacher-file-list
            ></ul>
          </div>
        </label>
      </div>
    </div>
    <div 
       data-form-field-visible='{
        "requirements-developer": ["val2"]
      }'
      class="constructor__row"
    >
      <div class="constructor__col constructor__col--full">
        <label class="constructor__label-row items-start">
          <span class="constructor__label-text white-space-normal">
            Загрузите скан акта о передаче Вам квартиры, в котором указаны передаваемые элементы отделки / внутриквартирное оборудование (в формате pdf)
          </span>
          <div
            class="file-attacher"
            data-file-attacher
          >
            <input
              id="requirements-developer-act-file"
              type="file"
              name="requirements-developer-act-file"
              accept=".pdf"
              data-file-attacher-input
              data-input-required
              class="file-attacher__input"
            />
            <label
              class="file-attacher__btn-text"
              for="requirements-developer-act-file"
              data-file-attacher-add-btn
            >
              <svg class="i-icon">
                <use xlink:href="#icon-file"></use>
              </svg>
              <span>Прикрепить файл</span>
            </label>
            <ul
              class="file-attacher__list"
              data-file-attacher-file-list
            ></ul>
          </div>
        </label>
      </div>
    </div>
    <b class="constructor__light-label">
      Квартира Вам застройщиком:
    </b>
    <div
      data-form-field-visible='{
        "requirements-developer": ["val1"]
      }'
    >
      <div class="constructor__row">
        <div class="constructor__col constructor__col--full">
          <div class="constructor__flex-gap items-start">
            <label class="radio radio--lg">
              <input
                class="radio__input"
                type="radio"
                name="requirements-developer-apartment-transferred"
                value="yes"
                checked
              />
              <span class="radio__emulator">
                <svg class="radio__icon i-icon">
                  <use xlink:href="#icon-check"></use>
                </svg>
              </span>
              <span class="radio__label">передана</span>
            </label>
            <div 
               data-form-field-visible='{
                "requirements-developer-apartment-transferred": ["yes"]
              }'
              class="constructor__col--grow-2"
            >
              <input
                placeholder="00.00.0000"
                data-input-required
                data-input-date="d.m.Y"
                name="requirements-developer-apartment-transferred-date"
                class="form-input w-340px"
              />
              <cite class="note">укажите фактическую дату передачи квартиры </cite>
            </div>
          </div>
        </div>
      </div>
      <div class="constructor__row">
        <div class="constructor__col">
          <label class="radio radio--lg">
            <input
              class="radio__input"
              type="radio"
              name="requirements-developer-apartment-transferred"
              value="no"
            />
            <span class="radio__emulator">
              <svg class="radio__icon i-icon">
                <use xlink:href="#icon-check"></use>
              </svg>
            </span>
            <span class="radio__label">не передана</span>
          </label>
        </div>
      </div>
    </div>
    <div
      data-form-field-visible='{
        "requirements-developer": ["val2"]
      }'
    >
      <div class="constructor__row">
        <div class="constructor__col constructor__col--full">
          <div class="constructor__label-row constructor__label-cite">
            <div class="constructor__label-text">
              Размер расходов, необходимых для приведения квартиры в соответствие с договором, составляет
            </div>
            <div class="flex ga-12 items-center flex-grow-2">
              <input
                type="number"
                data-input-required
                name="requirements-developer-apartment-transferred-cost"
                class="form-input w-200px"
              />
              <span>руб.,</span>
            </div>
          </div>
        </div>
      </div>
      <div class="constructor__row">
        <div class="constructor__col constructor__col--full">
          <label class="constructor__label-row items-start">
            <span class="constructor__label-text">
              что подтверждается 
            </span>
            <div
              class="file-attacher"
              data-file-attacher
            >
              <input
                id="requirements-developer-apartment-transferred-const-file"
                type="file"
                name="requirements-developer-apartment-transferred-const-file"
                accept=".pdf"
                data-file-attacher-input
                data-input-required
                class="file-attacher__input"
              />
              <label
                class="file-attacher__btn-text"
                for="requirements-developer-apartment-transferred-const-file"
                data-file-attacher-add-btn
              >
                <svg class="i-icon">
                  <use xlink:href="#icon-file"></use>
                </svg>
                <span>Прикрепить файл</span>
              </label>
              <cite class="note">загрузите в формате pdf скан первой страницы отчета / справки об оценке или договора подряда, заключенного для устранения недостатков</cite>
              <ul
                class="file-attacher__list"
                data-file-attacher-file-list
              ></ul>
            </div>
          </label>
        </div>
      </div>
    </div>
  </div>
</fieldset>
